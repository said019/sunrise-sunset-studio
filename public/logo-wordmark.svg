<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <!-- Wordmark: coral background, cream serif text "SUNRISE / SUNSET" -->
  <rect width="280" height="100" fill="#E36F4C" rx="10"/>

  <!-- Sun icon (small, left-aligned) -->
  <g transform="translate(18, 50)">
    <!-- Horizon line -->
    <line x1="-8" y1="8" x2="8" y2="8" stroke="#EFE7D9" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Sun disc half -->
    <clipPath id="wm-above">
      <rect x="-12" y="-20" width="24" height="28"/>
    </clipPath>
    <circle cx="0" cy="8" r="7" fill="#EFE7D9" clip-path="url(#wm-above)"/>
    <!-- Rays -->
    <g stroke="#EFE7D9" stroke-width="1.2" stroke-linecap="round" opacity="0.8">
      <line x1="0" y1="-2" x2="0" y2="-5"/>
      <line x1="5.5" y1="0.5" x2="7.3" y2="-1.3"/>
      <line x1="-5.5" y1="0.5" x2="-7.3" y2="-1.3"/>
      <line x1="7.2" y1="5" x2="9.5" y2="4.2"/>
      <line x1="-7.2" y1="5" x2="-9.5" y2="4.2"/>
    </g>
  </g>

  <!-- SUNRISE text -->
  <text
    x="38"
    y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    letter-spacing="5"
    fill="#EFE7D9"
  >SUNRISE</text>

  <!-- Thin divider line -->
  <line x1="38" y1="52" x2="242" y2="52" stroke="#EFE7D9" stroke-width="0.75" opacity="0.5"/>

  <!-- SUNSET text -->
  <text
    x="38"
    y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="300"
    letter-spacing="7"
    fill="#EFE7D9"
    opacity="0.9"
  >SUNSET</text>
</svg>
